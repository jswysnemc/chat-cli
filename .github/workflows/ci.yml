name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  test:
    name: Build And Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-latest
          - label: macOS
            os: macos-latest
          - label: Windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install tool dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install tool dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Install tool dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rg -ErrorAction SilentlyContinue)) {
            choco install ripgrep -y
          }

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release
