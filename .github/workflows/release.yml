name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish, for example v0.1.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "$tag" ]; then
            echo "No release tag available" >&2
            exit 1
          fi

          manifest_version="$(
            python -c 'import pathlib, re, sys; text = pathlib.Path("Cargo.toml").read_text(); match = re.search(r"^version\\s*=\\s*\"([^\"]+)\"", text, re.MULTILINE); print(match.group(1)) if match else sys.exit("failed to read version from Cargo.toml")'
          )"
          version="${tag#v}"

          if [ "$version" != "$manifest_version" ]; then
            echo "Tag $tag does not match Cargo.toml version $manifest_version" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build Release (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            binary_path: target/release/chat
            archive_ext: .tar.gz
          - label: macos-x86_64
            os: macos-13
            binary_path: target/release/chat
            archive_ext: .tar.gz
          - label: macos-arm64
            os: macos-14
            binary_path: target/release/chat
            archive_ext: .tar.gz
          - label: windows-x86_64
            os: windows-latest
            binary_path: target/release/chat.exe
            archive_ext: .zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install tool dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install tool dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Install tool dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rg -ErrorAction SilentlyContinue)) {
            choco install ripgrep -y
          }

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="chat-cli-${{ needs.prepare.outputs.tag }}-${{ matrix.label }}${{ matrix.archive_ext }}"
          mkdir -p dist
          cp "${{ matrix.binary_path }}" dist/chat
          cp README.md dist/README.md
          cp README_zh.md dist/README_zh.md
          cp LICENSE dist/LICENSE
          tar -C dist -czf "$archive" .

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "chat-cli-${{ needs.prepare.outputs.tag }}-${{ matrix.label }}${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/chat.exe"
          Copy-Item "README.md" "dist/README.md"
          Copy-Item "README_zh.md" "dist/README_zh.md"
          Copy-Item "LICENSE" "dist/LICENSE"
          Compress-Archive -Path dist/* -DestinationPath $archive -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-cli-${{ matrix.label }}
          path: chat-cli-${{ needs.prepare.outputs.tag }}-${{ matrix.label }}${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/*
