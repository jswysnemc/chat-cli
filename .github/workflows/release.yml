name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish, for example v0.1.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [ -z "$tag" ]; then
            echo "No release tag available" >&2
            exit 1
          fi

          if [ "$version" != "$manifest_version" ]; then
            echo "Tag $tag does not match Cargo.toml version $manifest_version" >&2
            exit 1
          fi

          archive="chat-cli-${tag}-linux-x86_64.tar.gz"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/chat dist/chat
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE
          tar -C dist -czf "${{ steps.meta.outputs.archive }}" .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive }}
          path: ${{ steps.meta.outputs.archive }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.archive }}
